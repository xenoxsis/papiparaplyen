version: "3.9"

services:
  paraplyen:
    build: .
    container_name: paraplyen
    restart: unless-stopped
    ports:
      - "3000:3000" # Next.js frontend
      - "3001:3001" # Express backend (IIS routes /api/* directly here)
    environment:
      DB_SERVER: ${DB_SERVER}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      BASE_URL: ${BASE_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      SMTP_HOST: ${SMTP_HOST:-mail.mdbeads.com}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-paraplyen@mdbeads.com}
      SMTP_PASS: ${SMTP_PASS}
      EMAIL_FROM: ${EMAIL_FROM:-paraplyen@mdbeads.com}
      DB_ENCRYPT: ${DB_ENCRYPT:-true}
      DB_TRUST_SERVER_CERTIFICATE: ${DB_TRUST_SERVER_CERTIFICATE:-false}
      SUPERUSER_EMAIL: ${SUPERUSER_EMAIL}
      DANISH_ADDRESS_API_TOKEN: ${DANISH_ADDRESS_API_TOKEN}
    extra_hosts:
      - "host.docker.internal:host-gateway"
